services:
  # The "Front Door" Proxy (Only in Prod)
  proxy:
    build:
      dockerfile: Dockerfile
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - api
      - ui
  api:
    build:
      dockerfile: Dockerfile
      context: ./server
    volumes: []
    ports: []
    expose:
      - "5001"
  worker:
    build:
      dockerfile: Dockerfile
      context: ./worker
    volumes: []
  ui:
    build:
      dockerfile: Dockerfile
      context: ./client
      args:
        # For prod mode, we build the react app. So need this as build argument instead of runtime env variable
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    volumes: []
    expose:
      - "3000"
