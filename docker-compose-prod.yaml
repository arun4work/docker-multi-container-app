services:
  postgres:
    image: "postgres:latest"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  redis:
    image: "redis:latest"
  api:
    # Use your Docker Hub username here (or an env var)
    image: ${DOCKERHUB_USERNAME:-my-local-test}/docker-multi-conatiner-app-api:latest
    build:
      dockerfile: Dockerfile
      context: ./server
    expose:
      - "5001"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - PG_USER=${PG_USER}
      - PG_HOST=${PG_HOST}
      - PG_DATABASE=${PG_DATABASE}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_PORT=${PG_PORT}
    depends_on:
      - postgres
      - redis
  worker:
    # Use your Docker Hub username here (or an env var)
    image: ${DOCKERHUB_USERNAME:-my-local-test}/docker-multi-conatiner-app-worker:latest
    build:
      dockerfile: Dockerfile
      context: ./worker
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
  ui:
    # Use your Docker Hub username here (or an env var)
    image: ${DOCKERHUB_USERNAME:-my-local-test}/docker-multi-conatiner-app-ui:latest
    build:
      dockerfile: Dockerfile
      context: ./client
      args:
        # For prod mode, we build the react app. So need this as build argument instead of runtime env variable
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    expose:
      - "3000"
  proxy:
    # Use your Docker Hub username here (or an env var)
    image: ${DOCKERHUB_USERNAME:-my-local-test}/docker-multi-conatiner-app-proxy:latest
    build:
      dockerfile: Dockerfile
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - api
      - ui
